<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顺丰速运 - 账号管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
.header { text-align: center; color: white; padding: 30px 0; }
.header h1 { font-size: 32px; margin-bottom: 10px; }
.header p { opacity: 0.9; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
    padding: 12px 24px; background: rgba(255,255,255,0.2);
    color: white; border: none; border-radius: 10px;
    cursor: pointer; font-size: 15px; transition: all 0.3s;
}
.tab:hover { background: rgba(255,255,255,0.3); }
.tab.active { background: white; color: #667eea; font-weight: 600; }
.card {
    background: white; border-radius: 16px; padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px;
}
.card h2 {
    font-size: 22px; color: #333; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
}
.btn {
    padding: 10px 20px; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s;
}
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
.btn-success { background: #10b981; color: white; }
.btn-success:hover { background: #059669; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-secondary { background: #e5e7eb; color: #374151; }
.btn-secondary:hover { background: #d1d5db; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.qr-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
.qr-item {
    text-align: center; padding: 20px;
    border: 2px solid #e5e7eb; border-radius: 12px; transition: all 0.3s;
}
.qr-item:hover { border-color: #667eea; }
.qr-item img { width: 200px; height: 200px; margin-bottom: 10px; }
.qr-item .api-name { font-size: 12px; color: #9ca3af; margin-top: 5px; }
.status-badge {
    display: inline-block; padding: 4px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
}
.status-waiting { background: #fef3c7; color: #d97706; }
.status-success { background: #d1fae5; color: #059669; }
.status-error { background: #fee2e2; color: #dc2626; }
.status-scanned { background: #dbeafe; color: #2563eb; }
textarea {
    width: 100%; min-height: 150px; padding: 12px;
    border: 2px solid #e5e7eb; border-radius: 8px;
    font-family: monospace; font-size: 13px; resize: vertical;
    transition: border-color 0.3s;
}
textarea:focus { outline: none; border-color: #667eea; }
.url-list { list-style: none; }
.url-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 10px; transition: all 0.3s;
}
.url-item:hover { border-color: #667eea; background: #f9fafb; }
.url-info { flex: 1; }
.url-preview {
    font-family: monospace; font-size: 12px; color: #374151;
    word-break: break-all; margin-bottom: 5px;
}
.url-meta {
    display: flex; gap: 15px; font-size: 12px; color: #6b7280; flex-wrap: wrap;
}
.url-actions { display: flex; gap: 8px; }
.stars { color: #fbbf24; }
.form-group { margin-bottom: 20px; }
.form-group label {
    display: block; margin-bottom: 8px; font-weight: 500; color: #374151;
}
.form-group input {
    width: 100%; padding: 10px 12px;
    border: 2px solid #e5e7eb; border-radius: 8px;
    font-size: 14px; transition: border-color 0.3s;
}
.form-group input:focus { outline: none; border-color: #667eea; }
.form-row { display: flex; gap: 15px; }
.form-row .form-group { flex: 1; }
.alert {
    padding: 12px 16px; border-radius: 8px;
    margin-bottom: 15px; font-size: 14px;
}
.alert-info { background: #dbeafe; color: #1e40af; }
.alert-success { background: #d1fae5; color: #065f46; }
.alert-warning { background: #fef3c7; color: #92400e; }
.alert-error { background: #fee2e2; color: #991b1b; }
.stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px; margin-bottom: 20px;
}
.stat-card {
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
    border-radius: 12px; text-align: center;
}
.stat-card .number { font-size: 36px; font-weight: bold; color: #667eea; }
.stat-card .label { font-size: 13px; color: #6b7280; margin-top: 5px; }
.powered {
    text-align: center; color: rgba(255,255,255,0.7);
    font-size: 12px; padding: 20px;
}
.loading {
    display: inline-block; width: 20px; height: 20px;
    border: 3px solid #e5e7eb; border-top-color: #667eea;
    border-radius: 50%; animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📦 顺丰速运账号管理面板</h1>
        <p>扫码登录 · 抓包提取 · 青龙同步 · 账号管理</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="scan">📱 扫码登录</button>
        <button class="tab" data-tab="extract">📋 粘贴提取</button>
        <button class="tab" data-tab="urls">📁 账号管理</button>
        <button class="tab" data-tab="qinglong">☁️ 青龙配置</button>
    </div>

    <!-- 扫码登录 -->
    <div id="tab-scan" class="card">
        <h2>📱 扫码登录获取 sfsyUrl</h2>
        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button class="btn btn-primary" id="btn-scan-app" style="flex:1;">📱 APP端扫码（推荐）</button>
            <button class="btn btn-secondary" id="btn-scan-mini" style="flex:1;">💬 小程序扫码</button>
        </div>
        <div class="alert alert-info" id="scan-tip">
            打开顺丰速运 APP → 扫一扫 → 扫描左侧二维码登录
        </div>
        <div id="scan-area">
            <div style="text-align:center; padding: 40px;">
                <p style="color:#6b7280; margin-bottom: 20px;">选择上方扫码方式开始</p>
                <button class="btn btn-primary" id="btn-start-scan" style="font-size: 18px; padding: 15px 40px;">
                    🚀 开始扫码登录
                </button>
            </div>
        </div>
    </div>

    <!-- 粘贴提取 -->
    <div id="tab-extract" class="card" style="display:none;">
        <h2>📋 粘贴抓取内容提取</h2>
        <div class="alert alert-info">
            将手机抓包APP（小蓝鸟/HttpCanary等）抓到的内容粘贴到下方，自动提取 sfsyUrl
        </div>
        <textarea id="extract-text" placeholder="粘贴请求URL、请求头、或完整请求内容..."></textarea>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn btn-primary" id="btn-extract">🔍 提取 sfsyUrl</button>
            <button class="btn btn-secondary" id="btn-clear-text">清空</button>
        </div>
        <div id="extract-result" style="margin-top: 20px;"></div>
    </div>

    <!-- 账号管理 -->
    <div id="tab-urls" class="card" style="display:none;">
        <h2>📁 账号管理</h2>
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="stat-local">0</div>
                <div class="label">本地账号数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-ql">0</div>
                <div class="label">青龙账号数</div>
            </div>
        </div>
        <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-success" id="btn-sync-all">☁️ 一键同步全部到青龙</button>
            <button class="btn btn-secondary" id="btn-refresh-urls">🔄 刷新</button>
        </div>
        <div id="url-list"></div>
    </div>

    <!-- 青龙配置 -->
    <div id="tab-qinglong" class="card" style="display:none;">
        <h2>☁️ 青龙面板配置</h2>
        <div class="alert alert-info">
            配置青龙面板信息后，可以一键同步 sfsyUrl 到青龙
        </div>
        <div class="form-group">
            <label>青龙面板地址</label>
            <input type="text" id="ql-url" placeholder="http://192.168.1.100:5700">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Client ID</label>
                <input type="text" id="ql-client-id" placeholder="应用ID">
            </div>
            <div class="form-group">
                <label>Client Secret</label>
                <input type="password" id="ql-client-secret" placeholder="应用密钥">
            </div>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary" id="btn-save-ql">💾 保存并测试连接</button>
            <button class="btn btn-secondary" id="btn-load-ql">🔄 加载配置</button>
        </div>
        <div id="ql-status" style="margin-top: 15px;"></div>
    </div>

    <div class="powered">顺丰速运签到工具 · QL-SF-CHECKIN</div>
</div>

<script src="/app.js"></script>
</body>
</html>
