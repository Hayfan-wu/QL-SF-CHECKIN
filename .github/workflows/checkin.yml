name: 顺丰速运每日签到

on:
  schedule:
    # 每天北京时间 8:51 和 21:51 运行
    - cron: '51 0,13 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '是否开启调试模式'
        required: false
        default: 'false'

jobs:
  checkin:
    runs-on: ubuntu-latest
    name: 执行签到任务
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check-in script
        env:
          sfsyUrl: ${{ secrets.SFSY_URL }}
          SFBF: ${{ secrets.SFBF }}
          SF_PROXY_API_URL: ${{ secrets.SF_PROXY_API_URL }}
        run: python sfsy.py
